    <title>IMEDIN Dashboard</title>
    <script>
      // Redirect semua 404 ke index.html dengan path tersimpan di sessionStorage
      var path = window.location.pathname;
      sessionStorage.setItem('redirectPath', path);
      window.location.replace('/imedin-dashboard/');
    </script>
  </head>

</html>
