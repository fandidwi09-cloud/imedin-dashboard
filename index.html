<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IMEDIN After-Sales Dashboard - Sistem monitoring perangkat medis" />
    <meta name="theme-color" content="#1e2022" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600&display=swap" rel="stylesheet" />
    <title>IMEDIN After-Sales Dashboard</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f7f7f5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Handle redirect dari 404.html - restore path sebelum React mount
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          // Strip base path prefix jika ada
          var base = 'imedin-dashboard/';
          if (redirect.indexOf(base) === 0) {
            redirect = '/' + redirect.slice(base.length);
          } else if (redirect.charAt(0) !== '/') {
            redirect = '/' + redirect;
          }
          window.history.replaceState(null, '', '/imedin-dashboard' + (redirect === '/' ? '' : redirect));
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
